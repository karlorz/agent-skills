interface:
  display_name: "Deep Research"
  short_description: "Research a topic across the web, current docs, and repositories. Output to terminal, file, or vault."
  default_prompt: "Research <topic> deeply using web search, documentation, and repository sources."

policy:
  allow_implicit_invocation: true

dependencies:
  tools:
    - type: "mcp"
      value: "context7"
      description: "Context7 MCP server for current library and framework documentation"
    - type: "mcp"
      value: "deepwiki-mcp"
      description: "DeepWiki MCP server for repository exploration and codebase Q&A"
