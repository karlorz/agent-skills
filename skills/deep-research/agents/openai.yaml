interface:
  display_name: "Deep Research"
  short_description: "Research a topic across the web, current docs, and repositories, then save a routed Obsidian note."
  default_prompt: "Research <topic> deeply, route the note into the correct vault folder, and include sources plus related notes."

policy:
  allow_implicit_invocation: true

dependencies:
  tools:
    - type: "mcp"
      value: "context7"
      description: "Context7 MCP server for current library and framework documentation"
    - type: "mcp"
      value: "deepwiki-mcp"
      description: "DeepWiki MCP server for repository exploration and codebase Q&A"
